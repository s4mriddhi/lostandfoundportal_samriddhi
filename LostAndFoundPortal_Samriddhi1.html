<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOST & FOUND — SMART PORTAL</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    /* ── GLOBAL RESET & MONO TYPOGRAPHY ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #fff; color: #000; font-family: 'Courier New', Courier, monospace; font-size: 13px; }
    input, textarea, select, button { font-family: 'Courier New', Courier, monospace; }

    /* ── BRUTALIST UTILITY CLASSES ── */
    .border-solid-2 { border: 2px solid #000; }
    .border-solid-3 { border: 3px solid #000; }
    .shadow-hard    { box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
    .shadow-hard-sm { box-shadow: 3px 3px 0px 0px rgba(0,0,0,1); }
    .shadow-inset   { box-shadow: inset 2px 2px 0px 0px rgba(0,0,0,0.15); }

    /* ── INPUTS ── */
    .input-base {
      width: 100%; padding: 10px 12px; border: 2px solid #000;
      border-radius: 0; background: #f5f5f5; color: #000;
      font-family: 'Courier New', Courier, monospace; font-size: 13px;
      outline: none; transition: box-shadow 0.1s;
    }
    .input-base:focus { box-shadow: 3px 3px 0px 0px rgba(0,0,0,1); background: #fff; }
    .input-base::placeholder { color: #888; }

    /* ── BUTTONS ── */
    .btn-black {
      background: #000; color: #fff; border: 2px solid #000; border-radius: 0;
      padding: 10px 18px; cursor: pointer; font-family: 'Courier New', Courier, monospace;
      font-size: 13px; font-weight: bold; letter-spacing: 0.05em;
      transition: box-shadow 0.1s, transform 0.1s;
    }
    .btn-black:hover { box-shadow: 3px 3px 0px 0px rgba(0,0,0,1); transform: translate(-1px,-1px); }
    .btn-black:active { transform: translate(1px,1px); box-shadow: none; }

    .btn-outline {
      background: #fff; color: #000; border: 2px solid #000; border-radius: 0;
      padding: 10px 18px; cursor: pointer; font-family: 'Courier New', Courier, monospace;
      font-size: 13px; font-weight: bold; letter-spacing: 0.05em;
      transition: box-shadow 0.1s, transform 0.1s;
    }
    .btn-outline:hover { box-shadow: 3px 3px 0px 0px rgba(0,0,0,1); transform: translate(-1px,-1px); background: #f0f0f0; }

    /* ── TAGS ── */
    .tag-lost  { border: 2px solid #000; background: #000; color: #fff; padding: 2px 8px; font-size: 11px; font-weight: bold; letter-spacing: 0.1em; }
    .tag-found { border: 2px solid #000; background: #fff; color: #000; padding: 2px 8px; font-size: 11px; font-weight: bold; letter-spacing: 0.1em; }

    /* ── TABLE ── */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: #000; color: #fff; padding: 10px 12px; text-align: left; font-size: 11px; letter-spacing: 0.1em; border: 2px solid #000; }
    .data-table td { padding: 10px 12px; border: 1px solid #ccc; border-left: 2px solid #000; border-right: 2px solid #000; vertical-align: middle; }
    .data-table tbody tr { border-bottom: 1px solid #ddd; }
    .data-table tbody tr:hover { background: #f5f5f5; cursor: pointer; }
    .data-table tbody tr:last-child td { border-bottom: 2px solid #000; }

    /* ── CATEGORY FILTER BUTTONS ── */
    .cat-btn { border: 2px solid #000; background: #fff; color: #000; padding: 6px 14px; cursor: pointer; font-family: 'Courier New', Courier, monospace; font-size: 12px; font-weight: bold; letter-spacing: 0.05em; border-radius: 0; }
    .cat-btn:hover { background: #000; color: #fff; }
    .cat-btn.active { background: #000; color: #fff; }

    /* ── HATCH PATTERN for photo placeholder ── */
    .hatch-bg {
      background-image: repeating-linear-gradient(
        45deg, #ccc 0px, #ccc 1px, transparent 1px, transparent 8px
      );
      background-color: #f0f0f0;
    }

    /* ── DASHED UPLOAD BOX ── */
    .upload-box {
      border: 2px dashed #000; padding: 40px 20px;
      text-align: center; cursor: pointer; background: #fafafa;
    }
    .upload-box:hover { background: #f0f0f0; }

    /* ── NAV LINK ── */
    .nav-link { color: #fff; cursor: pointer; font-size: 13px; font-weight: bold; letter-spacing: 0.08em; padding: 4px 2px; border-bottom: 2px solid transparent; text-decoration: none; }
    .nav-link:hover, .nav-link.active { border-bottom: 2px solid #fff; }
    .nav-link-dark { color: #000; cursor: pointer; font-size: 12px; font-weight: bold; letter-spacing: 0.08em; padding: 4px 2px; border-bottom: 2px solid transparent; }
    .nav-link-dark:hover { border-bottom: 2px solid #000; }

    /* ── SCREEN LABEL BADGE ── */
    .screen-label { border: 1px solid #ccc; padding: 3px 10px; font-size: 11px; color: #888; letter-spacing: 0.1em; display: inline-block; margin-bottom: 20px; }

    /* ── SPEC TABLE ── */
    .spec-table { width: 100%; border-collapse: collapse; }
    .spec-table td { padding: 10px 14px; border: 2px solid #000; font-size: 13px; }
    .spec-table td:first-child { font-weight: bold; background: #f0f0f0; width: 40%; letter-spacing: 0.05em; font-size: 11px; }

    /* ── THUMBNAIL GRID ── */
    .thumb { border: 2px solid #000; background: #e8e8e8; display: flex; align-items: center; justify-content: center; color: #999; font-size: 18px; cursor: pointer; }

    /* ── WIREFRAME PROTOTYPE NAV (top bar) ── */
    .proto-nav { background: #fff; border-bottom: 1px solid #ccc; padding: 10px 20px; display: flex; align-items: center; gap: 0; font-size: 12px; }
    .proto-nav-label { color: #888; font-size: 11px; letter-spacing: 0.05em; margin-right: 16px; }
    .proto-tab { padding: 5px 16px; border: 1px solid #ccc; cursor: pointer; font-size: 11px; font-weight: bold; letter-spacing: 0.05em; background: #fff; color: #666; border-radius: 0; margin-right: -1px; }
    .proto-tab:hover { background: #f0f0f0; color: #000; }
    .proto-tab.active { background: #000; color: #fff; border-color: #000; }

    /* ── FORM SECTION DIVIDER ── */
    .form-divider { border: none; border-top: 1px solid #000; margin: 20px 0; }

    /* ── DESCRIPTION BOX ── */
    .desc-box { border: 2px solid #888; background: #f5f5f5; padding: 12px 14px; font-size: 12px; line-height: 1.6; color: #555; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; }
    ::-webkit-scrollbar-thumb { background: #000; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

/* ════════════════════════════════════════
   MOCK DATA
════════════════════════════════════════ */
const LOST_ITEMS = [
  { id: 1, name: "Blue Backpack",   category: "Bags",        location: "Central Park, NY",         date: "Jun 18, 2026", status: "LOST" },
  { id: 2, name: "iPhone 15 Pro",   category: "Electronics", location: "Times Square Station",      date: "Jun 19, 2026", status: "LOST" },
  { id: 3, name: "Silver Watch",    category: "Jewelry",     location: "Penn Station – Platform 4", date: "Jun 20, 2026", status: "LOST" },
  { id: 4, name: "Car Keys",        category: "Keys",        location: "Whole Foods, 57th St",      date: "Jun 21, 2026", status: "LOST" },
  { id: 5, name: "Prescription Glasses", category: "Eyewear", location: "Columbus Circle",         date: "Jun 22, 2026", status: "LOST" },
];

const FOUND_ITEMS = [
  { id: 6, name: "Red Umbrella",    category: "Accessories", location: "42nd St Library",           date: "Jun 17, 2026", status: "FOUND" },
  { id: 7, name: "Leather Wallet",  category: "Wallets",     location: "City Bus Route 7",          date: "Jun 18, 2026", status: "FOUND" },
  { id: 8, name: "Student ID Card", category: "Documents",   location: "NYU Bobst Library",         date: "Jun 20, 2026", status: "FOUND" },
  { id: 9, name: "AirPods Pro",     category: "Electronics", location: "Grand Central Terminal",    date: "Jun 21, 2026", status: "FOUND" },
  { id: 10, name: "House Keys",     category: "Keys",        location: "Subway Line B, Car 4",      date: "Jun 22, 2026", status: "FOUND" },
];

const CATEGORIES = ["ALL", "ELECTRONICS", "BAGS", "KEYS", "JEWELRY", "DOCUMENTS", "ACCESSORIES", "EYEWEAR", "PETS"];
const CAT_OPTIONS = ["Electronics", "Bags", "Keys", "Jewelry", "Documents", "Accessories", "Eyewear", "Pets", "Wallets", "Other"];

/* ════════════════════════════════════════
   WIREFRAME PROTOTYPE NAV
════════════════════════════════════════ */
function ProtoNav({ view, setView }) {
  const tabs = [
    { id: "login",       label: "1. LOGIN" },
    { id: "dashboard",   label: "2. DASHBOARD" },
    { id: "reportLost",  label: "3. REPORT LOST" },
    { id: "reportFound", label: "4. REPORT FOUND" },
    { id: "itemDetails", label: "5. ITEM DETAILS" },
  ];
  return (
    <div className="proto-nav">
      <span className="proto-nav-label">WIREFRAME PROTOTYPE</span>
      {tabs.map(t => (
        <button key={t.id} className={`proto-tab${view === t.id ? " active" : ""}`} onClick={() => setView(t.id)}>
          {t.label}
        </button>
      ))}
    </div>
  );
}

/* ════════════════════════════════════════
   APP NAV BAR (Dashboard / Forms / Details)
════════════════════════════════════════ */
function AppNav({ view, setView, breadcrumb }) {
  return (
    <div style={{ background: "#000", color: "#fff", padding: "0 20px", display: "flex", alignItems: "center", justifyContent: "space-between", height: "52px", borderBottom: "3px solid #000" }}>
      {/* LEFT: LOGO + TITLE + BREADCRUMB */}
      <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
        <div
          style={{ width: 34, height: 34, background: "#fff", display: "flex", alignItems: "center", justifyContent: "center", border: "2px solid #fff", cursor: "pointer" }}
          onClick={() => setView("dashboard")}
        >
          <span style={{ color: "#000", fontWeight: "bold", fontSize: 14, letterSpacing: "0.05em" }}>LF</span>
        </div>
        <span style={{ fontWeight: "bold", fontSize: 14, letterSpacing: "0.08em", cursor: "pointer" }} onClick={() => setView("dashboard")}>
          LOST &amp; FOUND PORTAL
        </span>
        {breadcrumb && (
          <span style={{ color: "#aaa", fontSize: 12 }}>/ {breadcrumb}</span>
        )}
      </div>

      {/* RIGHT: NAV LINKS or BACK */}
      {view === "dashboard" ? (
        <div style={{ display: "flex", alignItems: "center", gap: "24px" }}>
          <a className="nav-link active">DASHBOARD</a>
          <a className="nav-link" onClick={() => {}}>MY REPORTS</a>
          <a className="nav-link" onClick={() => {}}>BROWSE</a>
          <a className="nav-link" onClick={() => {}}>NOTIFICATIONS</a>
          <div style={{ width: 32, height: 32, background: "#fff", display: "flex", alignItems: "center", justifyContent: "center", border: "2px solid #fff" }}>
            <span style={{ color: "#000", fontWeight: "bold", fontSize: 12 }}>JD</span>
          </div>
        </div>
      ) : (
        <button
          className="btn-outline"
          style={{ background: "transparent", color: "#fff", borderColor: "#fff", fontSize: 12 }}
          onClick={() => setView("dashboard")}
        >
          ← BACK TO DASHBOARD
        </button>
      )}
    </div>
  );
}

/* ════════════════════════════════════════
   SCREEN 1 – LOGIN
════════════════════════════════════════ */
function LoginPage({ setView }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");

  return (
    <div style={{ minHeight: "100vh", background: "#f0f0f0", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 20px" }}>
      <div className="screen-label">SCREEN 1 / LOGIN PAGE</div>
      <div className="border-solid-3 shadow-hard" style={{ background: "#fff", padding: "48px 40px", width: "100%", maxWidth: 460 }}>

        {/* LOGO */}
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 20 }}>
          <div style={{ width: 64, height: 64, background: "#000", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ color: "#fff", fontWeight: "bold", fontSize: 22, letterSpacing: "0.05em" }}>LF</span>
          </div>
        </div>

        {/* HEADING */}
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontWeight: "bold", fontSize: 20, letterSpacing: "0.15em", marginBottom: 4 }}>LOST &amp; FOUND</div>
          <div style={{ fontSize: 12, letterSpacing: "0.2em", color: "#555" }}>SMART PORTAL</div>
        </div>

        <hr style={{ border: "none", borderTop: "1px dashed #bbb", marginBottom: 28 }} />

        {/* EMAIL */}
        <div style={{ marginBottom: 20 }}>
          <label style={{ display: "block", fontWeight: "bold", fontSize: 12, letterSpacing: "0.1em", marginBottom: 6 }}>EMAIL ADDRESS</label>
          <input
            className="input-base"
            type="text"
            placeholder="user@example.com"
            value={email}
            onChange={e => setEmail(e.target.value)}
          />
          <div style={{ fontSize: 11, color: "#888", marginTop: 4 }}>← input: text</div>
        </div>

        {/* PASSWORD */}
        <div style={{ marginBottom: 28 }}>
          <label style={{ display: "block", fontWeight: "bold", fontSize: 12, letterSpacing: "0.1em", marginBottom: 6 }}>PASSWORD</label>
          <input
            className="input-base"
            type="password"
            placeholder="············"
            value={password}
            onChange={e => setPassword(e.target.value)}
          />
          <div style={{ fontSize: 11, color: "#888", marginTop: 4 }}>← input: password</div>
        </div>

        {/* LOGIN BTN */}
        <button
          className="btn-black"
          style={{ width: "100%", padding: "14px", fontSize: 15, letterSpacing: "0.15em" }}
          onClick={() => setView("dashboard")}
        >
          [ LOGIN ]
        </button>

        {/* FOOTER LINKS */}
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 16 }}>
          <span style={{ fontSize: 11, textDecoration: "underline", cursor: "pointer", color: "#555" }}>Forgot password?</span>
          <span style={{ fontSize: 11 }}>No account? <strong style={{ textDecoration: "underline", cursor: "pointer" }}>Sign Up →</strong></span>
        </div>
      </div>
      <div style={{ marginTop: 12, fontSize: 11, color: "#888" }}>* Wireframe — all form fields are non-functional placeholders</div>
    </div>
  );
}

/* ════════════════════════════════════════
   SCREEN 2 – DASHBOARD
════════════════════════════════════════ */
function Dashboard({ setView }) {
  const [search, setSearch] = useState("");
  const [activeCategory, setActiveCategory] = useState("ALL");

  // Filter helper
  const filterItems = (items) => items.filter(item => {
    const matchSearch = !search || [item.name, item.category, item.location].join(" ").toLowerCase().includes(search.toLowerCase());
    const matchCat = activeCategory === "ALL" || item.category.toUpperCase() === activeCategory;
    return matchSearch && matchCat;
  });

  const filteredLost  = useMemo(() => filterItems(LOST_ITEMS),  [search, activeCategory]);
  const filteredFound = useMemo(() => filterItems(FOUND_ITEMS), [search, activeCategory]);

  return (
    <div style={{ minHeight: "100vh", background: "#fff" }}>
      {/* ACTION STRIP */}
      <div style={{ padding: "20px 24px", display: "flex", gap: 12, alignItems: "center", borderBottom: "2px solid #000" }}>
        <div style={{ flex: 1, position: "relative" }}>
          <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "#999", fontSize: 14 }}>○</span>
          <input
            className="input-base"
            style={{ paddingLeft: 32, background: "#fff" }}
            placeholder="Search items by name, location, or description..."
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
        </div>
        <button className="btn-black" style={{ whiteSpace: "nowrap", padding: "10px 20px" }} onClick={() => setView("reportLost")}>
          + REPORT LOST
        </button>
        <button className="btn-outline" style={{ whiteSpace: "nowrap", padding: "10px 20px" }} onClick={() => setView("reportFound")}>
          + REPORT FOUND
        </button>
      </div>

      {/* CATEGORY FILTER */}
      <div style={{ padding: "16px 24px", borderBottom: "1px solid #ddd" }}>
        <div style={{ fontSize: 11, letterSpacing: "0.1em", color: "#888", marginBottom: 10 }}>FILTER BY CATEGORY</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {CATEGORIES.map(cat => (
            <button
              key={cat}
              className={`cat-btn${activeCategory === cat ? " active" : ""}`}
              onClick={() => setActiveCategory(cat)}
            >
              {cat}
            </button>
          ))}
        </div>
      </div>

      {/* TABLES */}
      <div style={{ padding: "24px" }}>

        {/* LOST ITEMS TABLE */}
        <div style={{ marginBottom: 40 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
            <div style={{ fontWeight: "bold", fontSize: 14, letterSpacing: "0.1em" }}>RECENT LOST ITEMS</div>
            <span style={{ fontSize: 11, textDecoration: "underline", cursor: "pointer", color: "#555" }}>View All →</span>
          </div>
          <div className="border-solid-2">
            <table className="data-table">
              <thead>
                <tr>
                  <th>ITEM NAME</th>
                  <th>CATEGORY</th>
                  <th>LOCATION</th>
                  <th>DATE</th>
                  <th>STATUS</th>
                </tr>
              </thead>
              <tbody>
                {filteredLost.length === 0 ? (
                  <tr><td colSpan={5} style={{ textAlign: "center", color: "#888", padding: "20px" }}>NO ITEMS MATCH FILTER</td></tr>
                ) : filteredLost.map(item => (
                  <tr key={item.id} onClick={() => setView("itemDetails")}>
                    <td><strong>{item.name}</strong></td>
                    <td style={{ color: "#555" }}>{item.category}</td>
                    <td style={{ color: "#555" }}>{item.location}</td>
                    <td style={{ color: "#777" }}>{item.date}</td>
                    <td><span className="tag-lost">{item.status}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        {/* FOUND ITEMS TABLE */}
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
            <div style={{ fontWeight: "bold", fontSize: 14, letterSpacing: "0.1em" }}>RECENT FOUND ITEMS</div>
            <span style={{ fontSize: 11, textDecoration: "underline", cursor: "pointer", color: "#555" }}>View All →</span>
          </div>
          <div className="border-solid-2">
            <table className="data-table">
              <thead>
                <tr>
                  <th>ITEM NAME</th>
                  <th>CATEGORY</th>
                  <th>LOCATION</th>
                  <th>DATE</th>
                  <th>STATUS</th>
                </tr>
              </thead>
              <tbody>
                {filteredFound.length === 0 ? (
                  <tr><td colSpan={5} style={{ textAlign: "center", color: "#888", padding: "20px" }}>NO ITEMS MATCH FILTER</td></tr>
                ) : filteredFound.map(item => (
                  <tr key={item.id} onClick={() => setView("itemDetails")}>
                    <td><strong>{item.name}</strong></td>
                    <td style={{ color: "#555" }}>{item.category}</td>
                    <td style={{ color: "#555" }}>{item.location}</td>
                    <td style={{ color: "#777" }}>{item.date}</td>
                    <td><span className="tag-found">{item.status}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   SHARED REPORT FORM (Screen 3 & 4)
════════════════════════════════════════ */
function ReportForm({ type, setView }) {
  const isLost = type === "lost";
  const [form, setForm] = useState({
    name: "", category: "", date: "Jun 22, 2026", description: "", location: "",
  });

  const update = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

  const placeholder = isLost
    ? { name: "e.g. Blue Jansport Backpack", loc: "e.g. Central Park near the fountain, New York", desc: "Describe the item in detail — color, brand, unique markings, contents...", dateLabel: "DATE LOST", locLabel: "LOCATION LOST" }
    : { name: "e.g. Red Leather Wallet",    loc: "e.g. Seat 14B on Metro Line 6, downtown bound", desc: "Describe what you found — color, brand, distinguishing features, any contents visible...", dateLabel: "DATE FOUND", locLabel: "LOCATION FOUND" };

  return (
    <div style={{ minHeight: "100vh", background: "#fff", paddingBottom: 60 }}>
      <div style={{ maxWidth: 680, margin: "0 auto", padding: "32px 24px" }}>
        <div className="screen-label">{isLost ? "SCREEN 3 / REPORT LOST ITEM" : "SCREEN 4 / REPORT FOUND ITEM"}</div>

        <div className="border-solid-3 shadow-hard" style={{ padding: "36px 32px" }}>
          {/* HEADER */}
          <h2 style={{ fontSize: 20, fontWeight: "bold", letterSpacing: "0.12em", marginBottom: 4 }}>
            {isLost ? "LOST ITEM DETAILS" : "FOUND ITEM DETAILS"}
          </h2>
          <hr className="form-divider" />

          {/* ITEM NAME */}
          <div style={{ marginBottom: 20 }}>
            <label style={{ display: "block", fontWeight: "bold", fontSize: 11, letterSpacing: "0.1em", marginBottom: 6 }}>ITEM NAME</label>
            <input className="input-base" placeholder={placeholder.name} value={form.name} onChange={e => update("name", e.target.value)} />
          </div>

          {/* CATEGORY + DATE */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
            <div>
              <label style={{ display: "block", fontWeight: "bold", fontSize: 11, letterSpacing: "0.1em", marginBottom: 6 }}>CATEGORY</label>
              <select className="input-base" value={form.category} onChange={e => update("category", e.target.value)}>
                <option value="">— Select Category —</option>
                {CAT_OPTIONS.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <label style={{ display: "block", fontWeight: "bold", fontSize: 11, letterSpacing: "0.1em", marginBottom: 6 }}>{placeholder.dateLabel}</label>
              <input className="input-base" value={form.date} onChange={e => update("date", e.target.value)} />
            </div>
          </div>

          {/* DESCRIPTION */}
          <div style={{ marginBottom: 20 }}>
            <label style={{ display: "block", fontWeight: "bold", fontSize: 11, letterSpacing: "0.1em", marginBottom: 6 }}>DESCRIPTION</label>
            <textarea
              className="input-base"
              style={{ height: 100, resize: "vertical" }}
              placeholder={placeholder.desc}
              value={form.description}
              onChange={e => update("description", e.target.value)}
            />
          </div>

          {/* LOCATION */}
          <div style={{ marginBottom: 24 }}>
            <label style={{ display: "block", fontWeight: "bold", fontSize: 11, letterSpacing: "0.1em", marginBottom: 6 }}>{placeholder.locLabel}</label>
            <input className="input-base" placeholder={placeholder.loc} value={form.location} onChange={e => update("location", e.target.value)} />
          </div>

          {/* UPLOAD */}
          <div style={{ marginBottom: 28 }}>
            <label style={{ display: "block", fontWeight: "bold", fontSize: 11, letterSpacing: "0.1em", marginBottom: 6 }}>UPLOAD IMAGE</label>
            <div className="upload-box">
              <div style={{ width: 36, height: 36, border: "2px solid #000", display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 10, fontSize: 18, fontWeight: "bold" }}>↑</div>
              <div style={{ fontWeight: "bold", fontSize: 13, marginBottom: 4 }}>Click to upload or drag &amp; drop</div>
              <div style={{ fontSize: 11, color: "#888" }}>PNG, JPG, GIF up to 10MB</div>
            </div>
            <div style={{ fontSize: 11, color: "#888", marginTop: 4 }}>← file input component</div>
          </div>

          {/* ACTIONS */}
          <div style={{ display: "flex", gap: 12 }}>
            <button
              className="btn-black"
              style={{ flex: 1, padding: "14px", fontSize: 14, letterSpacing: "0.1em" }}
              onClick={() => setView("dashboard")}
            >
              {isLost ? "[ SUBMIT LOST REPORT ]" : "[ SUBMIT FOUND REPORT ]"}
            </button>
            <button className="btn-outline" style={{ padding: "14px 20px" }} onClick={() => setView("dashboard")}>
              CANCEL
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   SCREEN 5 – ITEM DETAILS
════════════════════════════════════════ */
function ItemDetails({ setView }) {
  return (
    <div style={{ minHeight: "100vh", background: "#fff", paddingBottom: 60 }}>
      <div style={{ padding: "24px" }}>
        <div className="screen-label">SCREEN 5 / ITEM DETAILS</div>

        <div style={{ display: "grid", gridTemplateColumns: "360px 1fr", gap: 32, alignItems: "start" }}>

          {/* LEFT COLUMN */}
          <div>
            {/* MAIN PHOTO */}
            <div className="border-solid-2 hatch-bg" style={{ width: "100%", aspectRatio: "1 / 1", display: "flex", alignItems: "center", justifyContent: "center", position: "relative", marginBottom: 12 }}>
              <div style={{ border: "1px solid #999", padding: "6px 14px", background: "rgba(255,255,255,0.85)", fontSize: 11, letterSpacing: "0.05em" }}>ITEM PHOTO</div>
            </div>

            {/* THUMBNAILS */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 14 }}>
              {[1,2,3,4].map(n => (
                <div key={n} className="thumb" style={{ aspectRatio: "1/1" }}>—</div>
              ))}
            </div>

            {/* STATUS BLOCK */}
            <div className="border-solid-2" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px" }}>
              <span style={{ fontWeight: "bold", fontSize: 12, letterSpacing: "0.1em" }}>STATUS</span>
              <span className="tag-lost" style={{ fontSize: 13, padding: "4px 16px" }}>LOST</span>
            </div>
          </div>

          {/* RIGHT COLUMN */}
          <div>
            {/* META */}
            <div style={{ fontSize: 11, letterSpacing: "0.08em", color: "#777", marginBottom: 8 }}>
              ELECTRONICS · POSTED JUN 19, 2026
            </div>

            {/* TITLE */}
            <h1 style={{ fontSize: 24, fontWeight: "bold", letterSpacing: "0.1em", lineHeight: 1.2, marginBottom: 8 }}>
              IPHONE 15 PRO<br />(SPACE BLACK, 256GB)
            </h1>

            {/* REPORT META */}
            <div style={{ fontSize: 11, color: "#888", marginBottom: 20 }}>
              Report #LF-2026-00412 · Last updated 3 hours ago
            </div>

            {/* SPEC TABLE */}
            <div className="border-solid-2" style={{ marginBottom: 20 }}>
              <table className="spec-table">
                <tbody>
                  <tr><td>CATEGORY</td><td>Electronics</td></tr>
                  <tr><td>LAST SEEN</td><td>Times Square Station, Platform B</td></tr>
                  <tr><td>DATE LOST</td><td>June 19, 2026</td></tr>
                  <tr><td>REPORTED BY</td><td>J. Doe (verified user)</td></tr>
                  <tr><td>ITEM COLOR</td><td>Space Black</td></tr>
                  <tr><td>DISTINGUISHING MARKS</td><td>Small scratch on rear camera, blue case</td></tr>
                </tbody>
              </table>
            </div>

            {/* DESCRIPTION */}
            <div className="border-solid-2 desc-box" style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 10, fontWeight: "bold", letterSpacing: "0.1em", color: "#777", marginBottom: 8 }}>DESCRIPTION</div>
              Lost my iPhone 15 Pro Space Black 256GB at Times Square Station around 6:45 PM. The phone has a cracked screen protector and is in a blue Casetify case with a small yellow star sticker on the back. Find My is enabled. A reward is offered.
            </div>

            {/* ACTION BUTTONS */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              <button className="btn-black" style={{ padding: "16px", fontSize: 14, letterSpacing: "0.08em" }}>
                [ CLAIM THIS ITEM ]
              </button>
              <button className="btn-outline" style={{ padding: "16px", fontSize: 14, letterSpacing: "0.08em" }}>
                [ CONTACT REPORTER ]
              </button>
            </div>
          </div>

        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   ROOT APP
════════════════════════════════════════ */
function App() {
  // Master view state — drives ALL navigation
  const [view, setView] = useState("login");

  // Breadcrumb map
  const breadcrumbs = {
    reportLost:  "Report Lost Item",
    reportFound: "Report Found Item",
    itemDetails: "Item Details",
  };

  const showAppNav  = view !== "login";
  const breadcrumb  = breadcrumbs[view] || null;

  return (
    <div style={{ minHeight: "100vh" }}>
      {/* WIREFRAME PROTOTYPE TOP BAR */}
      <ProtoNav view={view} setView={setView} />

      {/* APP NAV (except on login) */}
      {showAppNav && <AppNav view={view} setView={setView} breadcrumb={breadcrumb} />}

      {/* MAIN VIEW SWITCHER */}
      {view === "login"       && <LoginPage setView={setView} />}
      {view === "dashboard"   && <Dashboard setView={setView} />}
      {view === "reportLost"  && <ReportForm type="lost"  setView={setView} />}
      {view === "reportFound" && <ReportForm type="found" setView={setView} />}
      {view === "itemDetails" && <ItemDetails setView={setView} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
